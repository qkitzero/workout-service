syntax = "proto3";

package muscle.v1;

import "google/api/annotations.proto";

option go_package = "github.com/qkitzero/workout-service/gen/go/muscle/v1";

service MuscleService {
  rpc ListMuscles(ListMusclesRequest) returns (ListMusclesResponse) {
    option (google.api.http) = {get: "/v1/muscles"};
  }
}

message Muscle {
  string muscle_id = 1;
  string code = 2;
  string name = 3;
}

message ListMusclesRequest {
  string lang = 1;
}

message ListMusclesResponse {
  repeated Muscle muscles = 1;
}
