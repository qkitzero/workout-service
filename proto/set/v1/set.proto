syntax = "proto3";

package set.v1;

import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/qkitzero/workout-service/gen/go/set/v1";

service SetService {
  rpc CreateSet(CreateSetRequest) returns (CreateSetResponse) {
    option (google.api.http) = {
      post: "/v1/sets"
      body: "*"
    };
  }
  rpc ListSets(ListSetsRequest) returns (ListSetsResponse) {
    option (google.api.http) = {get: "/v1/sets"};
  }
}

message Set {
  string set_id = 1;
  string workout_id = 2;
  string exercise_id = 3;
  int32 rep = 4;
  double weight = 5;
  google.protobuf.Timestamp trained_at = 6;
  google.protobuf.Timestamp created_at = 7;
}

message CreateSetRequest {
  string workout_id = 1;
  string exercise_id = 2;
  int32 rep = 3;
  double weight = 4;
  google.protobuf.Timestamp trained_at = 5;
}

message CreateSetResponse {
  string set_id = 1;
}

message ListSetsRequest {}

message ListSetsResponse {
  repeated Set sets = 1;
}
